<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Kalkulator Alokasi Pendapatan</title>
<meta name="theme-color" content="#0F6E56" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Alokasi Dana" />
<style>
  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --border: #e4e2da;
    --text-primary: #1f1f1d;
    --text-secondary: #6b6a64;
    --accent: #0F6E56;
    --accent-bg: #E1F5EE;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    padding: 1.25rem;
    padding-bottom: 3rem;
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0.5rem 0 1.25rem;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  input[type="number"] {
    flex: 1;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
    font-size: 16px;
    background: var(--card);
    color: var(--text-primary);
  }
  input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    height: 44px;
    padding: 0 16px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
  }
  button:active { opacity: 0.85; }
  .results {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .card .label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .card .value {
    font-size: 18px;
    font-weight: 600;
  }
  .section-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .clear-btn {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    height: 32px;
    font-size: 12px;
    padding: 0 10px;
  }
  #history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .empty {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 8px 0;
  }
</style>
</head>
<body>

<h1>Kalkulator alokasi pendapatan</h1>

<div class="input-row">
  <input type="number" id="income" placeholder="Contoh: 5000000" inputmode="numeric" />
  <button id="calc-btn">Hitung</button>
</div>

<div class="results" id="results"></div>

<div class="section-title">
  <span>Riwayat</span>
  <button class="clear-btn" id="clear-btn">Hapus riwayat</button>
</div>
<div id="history-list"></div>

<script>
const rules = [
  { key: 'kebutuhan', label: 'Kebutuhan hidup', pct: 50 },
  { key: 'haji', label: 'Haji / umroh', pct: 20 },
  { key: 'tabungan', label: 'Tabungan', pct: 10 },
  { key: 'investasi', label: 'Investasi', pct: 10 },
  { key: 'sedekah', label: 'Sedekah & ortu', pct: 10 }
];

const STORAGE_KEY = 'alokasi-history';

function fmt(n) {
  return 'Rp' + Math.round(n).toLocaleString('id-ID');
}

function renderResults(income) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  rules.forEach((r) => {
    const val = (income * r.pct) / 100;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="label">${r.label} (${r.pct}%)</div>
      <div class="value">${fmt(val)}</div>
    `;
    container.appendChild(card);
  });
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveHistory(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function renderHistory(list) {
  const el = document.getElementById('history-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty">Belum ada riwayat.</div>';
    return;
  }
  el.innerHTML = list
    .map(
      (item) => `
    <div class="history-item">
      <span>${item.date}</span>
      <span>${fmt(item.income)}</span>
    </div>
  `
    )
    .join('');
}

document.getElementById('calc-btn').addEventListener('click', () => {
  const income = parseFloat(document.getElementById('income').value);
  if (!income || income <= 0) return;
  renderResults(income);
  const list = loadHistory();
  list.unshift({ income, date: new Date().toLocaleString('id-ID') });
  const trimmed = list.slice(0, 10);
  saveHistory(trimmed);
  renderHistory(trimmed);
});

document.getElementById('income').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('calc-btn').click();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  renderHistory([]);
});

renderResults(0);
renderHistory(loadHistory());

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
