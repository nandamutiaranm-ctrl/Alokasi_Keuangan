<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Kalkulator Alokasi Pendapatan</title>
<meta name="theme-color" content="#F4C0D1" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Alokasi Dana" />
<style>
  :root {
    --bg: #FDF6F8;
    --card: #ffffff;
    --border: #F4DCE6;
    --text-primary: #4a3b42;
    --text-secondary: #9b8891;
    --accent: #D4537E;
    --pink: #FBEAF0;
    --pink-text: #993556;
    --purple: #EEEDFE;
    --purple-text: #534AB7;
    --mint: #E1F5EE;
    --mint-text: #0F6E56;
    --peach: #FAECE7;
    --peach-text: #993C1D;
    --yellow: #FAEEDA;
    --yellow-text: #854F0B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 8% 12%, #FBEAF055 0 26px, transparent 27px),
      radial-gradient(circle at 92% 8%, #EEEDFE66 0 30px, transparent 31px),
      radial-gradient(circle at 88% 92%, #E1F5EE66 0 34px, transparent 35px),
      radial-gradient(circle at 5% 90%, #FAEEDA66 0 24px, transparent 25px);
    background-repeat: no-repeat;
    color: var(--text-primary);
    padding: 1.25rem;
    padding-bottom: 3rem;
    max-width: 480px;
    margin: 0 auto;
  }
  .title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0.5rem 0 1.25rem;
  }
  .title-row .flower {
    font-size: 22px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  input[type="number"] {
    flex: 1;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0 12px;
    font-size: 16px;
    background: var(--card);
    color: var(--text-primary);
  }
  input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    height: 44px;
    padding: 0 16px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
  }
  button:active { opacity: 0.85; }
  .results {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .card {
    position: relative;
    border-radius: 16px;
    padding: 14px;
    overflow: hidden;
  }
  .card .flower-deco {
    position: absolute;
    top: -6px;
    right: -2px;
    font-size: 26px;
    opacity: 0.55;
  }
  .card .label {
    font-size: 12px;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .card .value {
    font-size: 18px;
    font-weight: 600;
  }
  .c-pink { background: var(--pink); color: var(--pink-text); }
  .c-purple { background: var(--purple); color: var(--purple-text); }
  .c-mint { background: var(--mint); color: var(--mint-text); }
  .c-peach { background: var(--peach); color: var(--peach-text); }
  .c-yellow { background: var(--yellow); color: var(--yellow-text); }
  .section-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .clear-btn {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    height: 32px;
    font-size: 12px;
    padding: 0 10px;
    border-radius: 10px;
  }
  #history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .empty {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 8px 0;
  }
</style>
</head>
<body>

<div class="title-row">
  <span class="flower">🌸</span>
  <h1>Kalkulator alokasi pendapatan</h1>
</div>

<div class="input-row">
  <input type="number" id="income" placeholder="Contoh: 5000000" inputmode="numeric" />
  <button id="calc-btn">Hitung</button>
</div>

<div class="results" id="results"></div>

<div class="section-title">
  <span>Riwayat</span>
  <button class="clear-btn" id="clear-btn">Hapus riwayat</button>
</div>
<div id="history-list"></div>

<script>
const rules = [
  { key: 'kebutuhan', label: 'Kebutuhan hidup', pct: 50, color: 'c-mint', flower: '🌿' },
  { key: 'haji', label: 'Haji / umroh', pct: 20, color: 'c-purple', flower: '🪷' },
  { key: 'tabungan', label: 'Tabungan', pct: 10, color: 'c-pink', flower: '🌸' },
  { key: 'investasi', label: 'Investasi', pct: 10, color: 'c-yellow', flower: '🌼' },
  { key: 'sedekah', label: 'Sedekah', pct: 10, color: 'c-peach', flower: '🌺' }
];

const STORAGE_KEY = 'alokasi-history';

function fmt(n) {
  return 'Rp' + Math.round(n).toLocaleString('id-ID');
}

function renderResults(income) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  rules.forEach((r) => {
    const val = (income * r.pct) / 100;
    const card = document.createElement('div');
    card.className = 'card ' + r.color;
    card.innerHTML = `
      <span class="flower-deco">${r.flower}</span>
      <div class="label">${r.label} (${r.pct}%)</div>
      <div class="value">${fmt(val)}</div>
    `;
    container.appendChild(card);
  });
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveHistory(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function renderHistory(list) {
  const el = document.getElementById('history-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty">Belum ada riwayat.</div>';
    return;
  }
  el.innerHTML = list
    .map(
      (item) => `
    <div class="history-item">
      <span>${item.date}</span>
      <span>${fmt(item.income)}</span>
    </div>
  `
    )
    .join('');
}

document.getElementById('calc-btn').addEventListener('click', () => {
  const income = parseFloat(document.getElementById('income').value);
  if (!income || income <= 0) return;
  renderResults(income);
  const list = loadHistory();
  list.unshift({ income, date: new Date().toLocaleString('id-ID') });
  const trimmed = list.slice(0, 10);
  saveHistory(trimmed);
  renderHistory(trimmed);
});

document.getElementById('income').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('calc-btn').click();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  renderHistory([]);
});

renderResults(0);
renderHistory(loadHistory());

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
